name: Java Add Numbers CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Show Files (Debug)
      run: ls -R

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Compile Java
      run: javac src/AddNumbers.java

    - name: Run Java
      run: java -cp src AddNumbers
